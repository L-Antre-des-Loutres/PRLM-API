vich_uploader:
    db_driver: orm
    mappings:
        pkmn_images:
            uri_prefix: /uploads/pkmn
            upload_destination: '%kernel.project_dir%/public/uploads/pkmn'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: true
        pkmn_images_old:
            uri_prefix: /images/pkmn # Images will be accessible through this route
            upload_destination: '%kernel.project_dir%/public/images/pkmn'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer # Generate a unique name
